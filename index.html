<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
</head>
<body>
    <div class="frame">
        <div id="scoreboard">
            <div class="title">Rock-Paper-Scissors</div>
            <!-- <div class="titlePlayer">Player</div> -->
            <div id="scorePlayer">Player-Score: 0</div>
            <!-- <div class="titleComputer">Computer</div> -->
            <div id="scoreComputer">Computer-Score: 0</div>

            <div id="round">Round: </div>
            <div id="playerChoice">Player-Choice: </div>
            <div id="computerChoice">Computer-Choice: </div>
            <div id="winner">- </div>
        </div>
        <div class="buttons">
            <button id="btnRock">Rock</button>
            <button id="btnPaper">Paper</button>
            <button id="btnScissors">Scissors</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
